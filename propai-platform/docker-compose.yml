version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      # 클라이언트 번들 인라인용 공개키(.env에서 치환). 런타임 env_file과 별개로 빌드타임 필요.
      args:
        NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY:-}
        NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-}
    image: propai-web:oracle
    restart: always
    expose:
      - "3000"
    env_file: 
      - .env
    networks:
      - propai-network
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.oracle
    image: propai-api:oracle
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # 이중 임포트 루트(app.* / apps.api.*) 해소 — A1 코로케이션 크래시(No module named 'app') 방지.
      # Micro(.env)와 동일값을 compose에 박아 호스트 .env 의존 없이 재현 보장.
      - PYTHONPATH=/app:/app/apps/api
      # 컨테이너 내부 localhost는 API 자신을 가리킨다. Compose 서비스명으로 고정해 health와 캐시가
      # 실제 Redis/Qdrant 컨테이너를 보도록 한다.
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./uploads:/app/uploads
    networks:
      - propai-network
    depends_on:
      - redis
      - qdrant

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - propai-network

  qdrant:
    image: qdrant/qdrant:v1.18.1
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - propai-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - propai-network
    depends_on:
      - web
      - api

networks:
  propai-network:
    driver: bridge

volumes:
  redis_data:
