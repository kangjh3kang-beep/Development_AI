version: '3.8'

services:
  propai-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: propai-api:v49.0
    container_name: propai-api-prod
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://propai:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/propaidb
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - DEBUG=false
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      # 인터프리터 few-shot 주입 게이트 배선(기본 0=꺼짐 — 켜는 건 관리자 결정).
      # base_interpreter._env_flag 가 콜타임에 읽으므로 값 변경은 재시작 없이도 반영.
      - INTERP_FEWSHOT=${INTERP_FEWSHOT:-0}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - propai-net

  propai-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: propai-web:v49.0
    container_name: propai-web-prod
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # ★config 발산 정합(PR#329 R2): server-only VWORLD_API_KEY 필수 — 사통맵 타일
      #   프록시(vworld-wmts-proxy.ts·vworld-wms-proxy.ts)가 이 값이 없으면 503을
      #   반환해 기저지도(Base/Satellite/Hybrid)·지적 WMS가 전면 회색이 된다.
      #   root docker-compose.yml(web 서비스, safe-deploy 경로)은 env_file:.env로
      #   이미 주입되지만, 이 prod compose는 누락돼 있었다 — 동일 .env 값을 명시 주입한다.
      - VWORLD_API_KEY=${VWORLD_API_KEY}
    ports:
      - "3000:3000"
    networks:
      - propai-net
    depends_on:
      - propai-api

  postgres:
    image: postgres:15-alpine
    container_name: propai-postgres-prod
    restart: always
    environment:
      - POSTGRES_USER=propai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=propaidb
    volumes:
      - propai_pg_data:/var/lib/postgresql/data
    networks:
      - propai-net

  redis:
    image: redis:7-alpine
    container_name: propai-redis-prod
    restart: always
    volumes:
      - propai_redis_data:/data
    networks:
      - propai-net

volumes:
  propai_pg_data:
  propai_redis_data:

networks:
  propai-net:
    driver: bridge
