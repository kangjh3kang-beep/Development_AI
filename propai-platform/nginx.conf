events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Nginx 리버스 프록시 설정
    server {
        listen 80;
        server_name _;

        # 프런트엔드 정적 파일 캐싱 (Next.js 빌드 산출물 중 public 및 static 폴더 등)
        # standalone 모드에서는 Next.js가 자체적으로 서빙해주지만, Nginx에서 앞단 캐싱하면 더 빠릅니다. (선택사항)

        # 1. 백엔드 API 라우팅 (/api/*)
        location = /health {
            proxy_pass http://api:8000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 지원 (API 서버에서 WebSockets을 사용하는 경우)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 백엔드 연산이 길어질 수 있으므로 타임아웃 넉넉히 부여
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        # FastAPI 문서 엔드포인트도 백엔드로 연결
        location /docs {
            proxy_pass http://api:8000/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://api:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # 2. 나머지 모든 요청은 프런트엔드(Next.js)로 라우팅
        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js Hot Reload (개발 환경) 및 추후 Next.js WebSocket 지원용
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
