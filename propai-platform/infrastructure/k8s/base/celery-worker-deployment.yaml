apiVersion: apps/v1
kind: Deployment
metadata:
  name: propai-celery-worker
  namespace: propai
  labels:
    app: propai
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: propai
      component: celery-worker
  template:
    metadata:
      labels:
        app: propai
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: propai/api:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,rates,cost
          envFrom:
            - secretRef:
                name: propai-api-secrets
            - configMapRef:
                name: propai-api-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.tasks.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
      restartPolicy: Always
