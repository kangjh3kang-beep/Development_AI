# Alembic 마이그레이션 설정
# 실행: cd apps/api && alembic upgrade head

[alembic]
script_location = database/migrations
prepend_sys_path = .

# sqlalchemy.url은 env.py에서 동적으로 설정
# sqlalchemy.url = postgresql+asyncpg://propai:secret@localhost:5432/propaidb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
