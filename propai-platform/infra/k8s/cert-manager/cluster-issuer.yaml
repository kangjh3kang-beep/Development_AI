# cert-manager ClusterIssuer — Let's Encrypt 자동 TLS 인증서
# 요구사항: cert-manager 설치 필요
# kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@propai.io
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@propai.io
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# 와일드카드 인증서 (DNS-01 챌린지, AWS Route53)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: propai-wildcard-tls
  namespace: propai
spec:
  secretName: propai-wildcard-tls-secret
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "*.propai.io"
    - "propai.io"
  duration: 2160h   # 90일
  renewBefore: 720h  # 30일 전 갱신
