# PropAI v30.0 - 프로덕션 오버레이
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: propai-production

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: propai-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: propai-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: ghcr.io/propai/propai-backend
    newTag: latest
  - name: ghcr.io/propai/propai-frontend
    newTag: latest
  - name: ghcr.io/propai/propai-worker
    newTag: latest
