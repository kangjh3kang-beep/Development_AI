# PropAI v30.0 - 스테이징 오버레이
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: propai-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: propai-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: propai-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ghcr.io/propai/propai-backend
    newTag: staging
  - name: ghcr.io/propai/propai-frontend
    newTag: staging
  - name: ghcr.io/propai/propai-worker
    newTag: staging
