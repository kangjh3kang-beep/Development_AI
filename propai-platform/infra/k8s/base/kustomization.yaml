# PropAI v30.0 - Kustomize 기본 설정
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: propai

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - api-deployment.yaml
  - api-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - worker-deployment.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: propai
  app.kubernetes.io/managed-by: kustomize
