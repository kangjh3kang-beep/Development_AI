# PropAI v30.0 - 웹 프론트엔드 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: propai-web
  namespace: propai
  labels:
    app.kubernetes.io/name: propai-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: propai-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: propai-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: propai-web
          image: ghcr.io/propai/propai-frontend:latest
          ports:
            - name: http
              containerPort: 3000
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: propai-config
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
