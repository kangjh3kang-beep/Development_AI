# PropAI v30.0 - API 서버 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: propai-api
  namespace: propai
  labels:
    app.kubernetes.io/name: propai-api
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: propai-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: propai-api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: propai-api
          image: ghcr.io/propai/propai-backend:latest
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: propai-config
            - secretRef:
                name: propai-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
