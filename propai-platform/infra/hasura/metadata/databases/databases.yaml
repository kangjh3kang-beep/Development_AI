# PropAI v30.0 - Hasura 데이터베이스 설정
- name: default
  kind: postgres
  configuration:
    connection_info:
      database_url:
        from_env: HASURA_GRAPHQL_DATABASE_URL
      pool_settings:
        max_connections: 50
        idle_timeout: 180
        retries: 1
  tables: "!include default/tables/tables.yaml"
