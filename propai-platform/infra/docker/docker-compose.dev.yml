version: '3.8'

services:
  # 1. PostgreSQL + PostGIS (메인 DB)
  postgres:
    image: postgis/postgis:16-3.4
    container_name: propai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-propaidb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. TimescaleDB (IoT/드론 시계열)
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: propai-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-propaidb}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Redis (캐시, 세션, Circuit Breaker)
  redis:
    image: redis:7-alpine
    container_name: propai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Qdrant (법령 RAG 벡터 DB)
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: propai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. Hasura (GraphQL 엔진)
  hasura:
    image: hasura/graphql-engine:v2.38.0
    container_name: propai-hasura
    environment:
      HASURA_GRAPHQL_DATABASE_URL: ${DATABASE_URL:-postgres://propai:secret@postgres:5432/propaidb}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-hasura_super_secret_key}
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. MLflow (실험 추적, 모델 레지스트리)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: propai-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 20s
      timeout: 5s
      retries: 5

  # 7. EMQX (드론 IoT MQTT 브로커)
  emqx:
    image: emqx/emqx:5.6.0
    container_name: propai-emqx
    environment:
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-emqx_pass}
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18083/api/v5/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 8. MinIO (S3 호환 오브젝트 스토리지 - IFC/이미지)
  minio:
    image: minio/minio:latest
    container_name: propai-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 9. Prometheus (메트릭 수집)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: propai-prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 10. Grafana (모니터링 대시보드)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: propai-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 11. Kong (API Gateway & Rate Limiting - 보안 단계 12)
  kong:
    image: kong:3.6.1-ubuntu
    container_name: propai-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
    ports:
      - "8800:8000"  # API Proxy (포트 충돌 회피 8000 -> 8800)
      - "8801:8001"  # Admin API (포트 충돌 회피 8001 -> 8801)
    # volumes:
    #   - ./kong.yml:/etc/kong/kong.yml  # 추후 API 환경 구성 시 연결
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 12. Evidently (ML 드리프트 모니터링 - 우선순위 P3)
  evidently:
    image: evidently/evidently-service:latest
    container_name: propai-evidently
    ports:
      - "8085:8000"
    volumes:
      - evidently_data:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 20s
      timeout: 5s
      retries: 5

  # 13. Airflow (MLOps 워크플로 스케줄링)
  airflow:
    image: apache/airflow:2.9.0
    container_name: propai-airflow
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      _AIRFLOW_DB_UPGRADE: "True"
      _AIRFLOW_WWW_USER_CREATE: "True"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  timescale_data:
  qdrant_data:
  minio_data:
  emqx_data:
  grafana_data:
  evidently_data:
