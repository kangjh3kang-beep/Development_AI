# PropAI v30.0 - Prometheus 설정
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 백엔드
  - job_name: "propai-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    scrape_interval: 10s

  # arq 워커
  - job_name: "propai-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
    scrape_interval: 30s

  # PostgreSQL (postgres_exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Nginx
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:9113"]

  # Node exporter (호스트 메트릭)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
