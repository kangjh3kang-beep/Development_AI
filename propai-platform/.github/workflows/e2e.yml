name: E2E Tests

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/**"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: propai
          POSTGRES_PASSWORD: propai_password
          POSTGRES_DB: propai_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @propai/web exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build --filter @propai/ui --filter @propai/types --filter @propai/utils

      - name: Start API server
        env:
          DATABASE_URL: postgresql+asyncpg://propai:propai_password@localhost:5432/propai_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: e2e-test-secret-key
          ENVIRONMENT: test
        run: |
          cd apps/api && PYTHONPATH=. python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API server ready (${i}s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API server start failed"
              exit 1
            fi
            sleep 1
          done

      - name: Build & start Web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          pnpm --filter @propai/web build
          pnpm --filter @propai/web start &
          sleep 5

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3000
          CI: true
        run: pnpm --filter @propai/web exec playwright test --reporter=github

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/web/test-results/
          retention-days: 7
