name: Deploy to Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release environment
        env:
          RELEASE_KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
          RELEASE_API_URL: ${{ secrets.STAGING_API_URL || secrets.STAGING_URL }}
          RELEASE_WEB_URL: ${{ secrets.STAGING_WEB_URL || secrets.STAGING_URL }}
          RELEASE_SMOKE_TOKEN: ${{ secrets.RELEASE_SMOKE_TOKEN_STAGING || secrets.RELEASE_SMOKE_TOKEN }}
        run: |
          python scripts/release/validate_release_env.py --target staging

  build-and-push:
    name: Build & Push Images
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      api_image: ${{ steps.deploy-images.outputs.api_image }}
      web_image: ${{ steps.deploy-images.outputs.web_image }}
      worker_image: ${{ steps.deploy-images.outputs.worker_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Worker image metadata
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set deploy image refs
        id: deploy-images
        run: |
          echo "api_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:staging-latest" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:staging-latest" >> "$GITHUB_OUTPUT"
          echo "worker_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:staging-latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Staging
    needs: [preflight, build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        env:
          RELEASE_KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p $HOME/.kube
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          value = os.environ["RELEASE_KUBE_CONFIG"].strip()
          output = Path.home() / ".kube" / "config"

          try:
              decoded = base64.b64decode(value, validate=True).decode("utf-8")
              content = decoded if "apiVersion:" in decoded and "clusters:" in decoded else value
          except Exception:
              content = value

          output.write_text(content, encoding="utf-8")
          PY

      - name: Apply Kustomize overlay
        run: |
          kubectl apply -k infra/k8s/overlays/staging/

      - name: Pin rollout images
        run: |
          kubectl set image deployment/propai-api propai-api="${{ needs.build-and-push.outputs.api_image }}" -n propai-staging
          kubectl set image deployment/propai-web propai-web="${{ needs.build-and-push.outputs.web_image }}" -n propai-staging
          kubectl set image deployment/propai-worker propai-worker="${{ needs.build-and-push.outputs.worker_image }}" -n propai-staging

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/propai-api -n propai-staging
          kubectl rollout restart deployment/propai-web -n propai-staging
          kubectl rollout restart deployment/propai-worker -n propai-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/propai-api -n propai-staging --timeout=300s
          kubectl rollout status deployment/propai-web -n propai-staging --timeout=300s
          kubectl rollout status deployment/propai-worker -n propai-staging --timeout=300s

      - name: Post-deploy release smoke
        env:
          RELEASE_API_URL: ${{ secrets.STAGING_API_URL || secrets.STAGING_URL }}
          RELEASE_WEB_URL: ${{ secrets.STAGING_WEB_URL || secrets.STAGING_URL }}
          RELEASE_SMOKE_TOKEN: ${{ secrets.RELEASE_SMOKE_TOKEN_STAGING || secrets.RELEASE_SMOKE_TOKEN }}
        run: |
          python scripts/release/run_release_smoke.py \
            --target staging \
            --api-base-url "$RELEASE_API_URL" \
            --web-base-url "$RELEASE_WEB_URL" \
            --access-token "$RELEASE_SMOKE_TOKEN"
          echo "Staging 배포 성공"

      - name: Post-deploy observability smoke
        env:
          RELEASE_PROMETHEUS_URL: ${{ secrets.STAGING_PROMETHEUS_URL || secrets.PROMETHEUS_URL }}
          RELEASE_ALERTMANAGER_URL: ${{ secrets.STAGING_ALERTMANAGER_URL || secrets.ALERTMANAGER_URL }}
          RELEASE_GRAFANA_URL: ${{ secrets.STAGING_GRAFANA_URL || secrets.GRAFANA_URL }}
          RELEASE_GRAFANA_API_KEY: ${{ secrets.STAGING_GRAFANA_API_KEY || secrets.GRAFANA_API_KEY }}
        run: |
          if [ -z "$RELEASE_PROMETHEUS_URL" ] || [ -z "$RELEASE_ALERTMANAGER_URL" ] || [ -z "$RELEASE_GRAFANA_URL" ]; then
            echo "Observability smoke skipped: required URLs are not configured."
            exit 0
          fi

          ARGS=(
            --target staging
            --prometheus-url "$RELEASE_PROMETHEUS_URL"
            --alertmanager-url "$RELEASE_ALERTMANAGER_URL"
            --grafana-url "$RELEASE_GRAFANA_URL"
          )
          if [ -n "$RELEASE_GRAFANA_API_KEY" ]; then
            ARGS+=(--grafana-api-key "$RELEASE_GRAFANA_API_KEY")
          fi

          python scripts/release/run_observability_smoke.py "${ARGS[@]}"
