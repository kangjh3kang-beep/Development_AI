name: Web Accessibility Check

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'

jobs:
  a11y_audit:
    name: WCAG 2.1 AA Audit (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Web
        run: pnpm build --filter @propai/web
      # Playwright E2E 기반 axe-core 자동 테스트 실행 (STEP 10, 11과 연동)
      # 향후 pnpm test:e2e 명령어에 axe-core 가 통합되어 있다고 가정
      - name: Run Accessibility Tests
        run: pnpm test  --filter @propai/web
