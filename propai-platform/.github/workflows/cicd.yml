name: PropAI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test_backend:
    name: Backend Test (Claude Code)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: propai
          POSTGRES_PASSWORD: propai_password
          POSTGRES_DB: propai_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Run Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://propai:propai_password@localhost:5432/propai_db
        run: |
          pytest tests/ --cov=apps/api

  build_and_test_frontend:
    name: Frontend Test (Codex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint and Type Check
        run: |
          pnpm lint
          pnpm type-check
      - name: Build Web
        run: pnpm build --filter @propai/web

  smart_contract_test:
    name: Smart Contract Test & Slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: cd contracts && pnpm install
      - name: Run Hardhat Tests
        run: cd contracts && npx hardhat test
      - name: Run Slither Security Analysis
        run: docker run --rm -v ${{ github.workspace }}/contracts:/share trailofbits/eth-security-toolbox -c "slither /share"
