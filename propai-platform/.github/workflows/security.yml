name: Security Vulnerability Scan

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # 매주 일요일 자정 정기 스캔

jobs:
  python_security_scan:
    name: Bandit Python Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r apps/api/ -ll -ii

  container_scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build local Docker image for scanning
        run: docker build -t propai-api:latest apps/api
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'propai-api:latest' # docker-compose 이름에 맞춰 조정 필요
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  dependency_scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan Python dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip-audit --strict --desc

  owasp_zap_scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: [python_security_scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start API server
        run: |
          docker build -t propai-api:latest apps/api
          docker run -d --name propai-api -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///test.db \
            -e ENVIRONMENT=test \
            propai-api:latest
          # API 서버 기동 대기
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/health && break
            sleep 2
          done
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          cmd_options: '-a -j'
          allow_issue_writing: false
      - name: Stop API server
        if: always()
        run: docker stop propai-api || true

  secret_scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
