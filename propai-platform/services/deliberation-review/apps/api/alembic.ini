[alembic]
script_location = apps/api/alembic
prepend_sys_path = apps/api
# 실 URL은 env.py가 app.settings에서 주입(아래는 placeholder).
sqlalchemy.url = postgresql+asyncpg://propai_user:propai_pass_dev@localhost:5432/propai_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
