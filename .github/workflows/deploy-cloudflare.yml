name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test gate (배포 전 필수)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: propai-platform/apps/api/requirements.txt

      - name: Install backend dependencies
        run: pip install -r propai-platform/apps/api/requirements.txt

      - name: Backend unit tests
        working-directory: propai-platform/apps/api
        run: python -m pytest tests/ -q --no-header

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      - name: Build and Deploy OpenNext to Cloudflare Workers
        run: |
          pnpm run build:worker
          pnpm exec opennextjs-cloudflare deploy
        working-directory: propai-platform/apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
