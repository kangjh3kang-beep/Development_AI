name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Web deploy gate (배포 전 필수)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: propai-platform

      - name: Type check
        run: pnpm type-check
        working-directory: propai-platform/apps/web

      - name: Lint
        run: pnpm exec eslint . --quiet --no-cache
        working-directory: propai-platform/apps/web

      - name: Dashboard IA regression tests
        run: |
          pnpm test:run -- \
            'app/[locale]/(dashboard)/__tests__/dashboard-home-navigation.test.tsx' \
            'app/[locale]/(dashboard)/__tests__/dashboard-route-shells.test.tsx' \
            components/layout/nav-config.test.ts \
            lib/navigation/route-registry.test.ts
        working-directory: propai-platform/apps/web

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      - name: Build and Deploy OpenNext to Cloudflare Workers
        run: |
          pnpm run build:worker
          pnpm exec opennextjs-cloudflare deploy
        working-directory: propai-platform/apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
