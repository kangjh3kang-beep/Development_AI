name: CI

on:
  push:
    branches: [main]
    # 워크플로우 자신 포함 — CI 정의만 바꾼 PR이 CI 미발화로 무검증 머지되던 갭 봉합
    # (paths 필터가 propai-platform/** 뿐이라 .github 변경은 트리거 밖이었음).
    paths: ["propai-platform/**", ".github/workflows/ci.yml"]
  # ★pull_request는 paths 필터 없이 항상 발화 — 브랜치보호 required check가 워크플로우
  #   레벨 paths 스킵과 만나면 문서 전용 PR이 "Expected" 영구대기로 차단되는 함정이 있다.
  #   경로 판별은 아래 changes 잡(잡 레벨 if)으로 이관: GitHub는 if로 스킵된 잡을
  #   required 충족으로 취급하므로, 문서 PR은 3잡 스킵으로 통과·플랫폼 PR은 전체 실행.
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Filter paths (PR만 판별 — push/dispatch는 항상 전체 실행)
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        # ★R1 하드닝: 판별 실패는 반드시 '전체 실행'으로 귀결(fail-safe) — 이 잡의 실패가
        #   하위 required 잡 skip=충족(fail-open 무검증 머지)으로 새지 않게. here-string은
        #   대형 PR에서 printf|grep-q/head 조합의 SIGPIPE+pipefail 오판을 원천 제거.
        #   잔여 실패(러너 사망 등) 대비로 브랜치보호에 'Detect changes'도 required 등록.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "platform=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename'); then
            echo "files API 실패 — 안전측 전체 실행"
            echo "platform=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          head -50 <<<"$FILES" || true
          if grep -qE '^(propai-platform/|\.github/workflows/ci\.yml$)' <<<"$FILES"; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "platform=false" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: Backend (pytest)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propai-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: propai-platform/apps/api/requirements.txt

      - name: Install GDAL native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # gdal 파이썬 바인딩은 시스템 libgdal 버전과 일치해야 소스빌드된다. requirements의 정확핀 대신
          # 시스템 버전으로 먼저 설치하면, 이후 requirements(gdal 범위)는 충족돼 재빌드하지 않는다.
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          pip install "gdal==$(gdal-config --version)"
          pip install -r apps/api/requirements.txt

      # ★#148로 위반 0 달성(전면 --fix+무해규칙 ignore) → W1-9에서 차단(required) 게이트로
      #   승격. 위반 0 시점의 차단화라 기존 PR에 비용 없음; ignore 규칙은 점진 해제.
      - name: Ruff (lint)
        working-directory: propai-platform/apps/api
        run: |
          pip install ruff
          python -m ruff check .

      - name: Run unit tests (apps/api)
        working-directory: propai-platform/apps/api
        run: python -m pytest tests/ -q --no-header

      # 루트 계약 스위트(propai-platform/tests) — 과거 CI 밖에서 17실패가 방치됐던
      # 갭을 게이트로 편입(931+ tests, 무DB). apps/api 스위트와 별개 커버리지.
      - name: Run root contract suite (propai-platform/tests)
        working-directory: propai-platform
        run: python -m pytest tests/ -q --no-header

  frontend-checks:
    name: Frontend (type-check + lint + test)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      # W1-9: tsc·eslint 현재 0 error(그린) → 차단 게이트로 승격(비차단은 게이트 착시).
      # eslint 경고(~190)는 --max-warnings 미설정이라 통과 — 경고 정리 후 0 게이트화 예정.
      - name: Type check
        run: pnpm type-check
        working-directory: propai-platform/apps/web

      - name: Lint
        run: pnpm lint
        working-directory: propai-platform/apps/web

      - name: Unit tests
        run: pnpm test:run
        working-directory: propai-platform/apps/web

  # ★next build 게이트 — 정적 프리렌더(Suspense 경계)·React Compiler 결함은 tsc/eslint를
  #   통과하고도 build에서만 표면화되어 배포서(158)에서 처음 발견되던 클래스였다
  #   (#398→#400 useSearchParams 프리렌더 fail·#408→#410 React Compiler error 전례).
  #   backend-tests(~14m)가 장대(critical path)라 병렬 잡 추가는 총 CI 시간을 늘리지 않는다.
  frontend-build:
    name: Frontend (next build)
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      - name: Next build (prerender + React Compiler gate)
        run: pnpm build
        working-directory: propai-platform/apps/web
