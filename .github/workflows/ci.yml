name: CI

on:
  push:
    branches: [main]
    paths: ["propai-platform/**"]
  pull_request:
    paths: ["propai-platform/**"]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propai-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: propai-platform/apps/api/requirements.txt

      - name: Install GDAL native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # gdal 파이썬 바인딩은 시스템 libgdal 버전과 일치해야 소스빌드된다. requirements의 정확핀 대신
          # 시스템 버전으로 먼저 설치하면, 이후 requirements(gdal 범위)는 충족돼 재빌드하지 않는다.
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          pip install "gdal==$(gdal-config --version)"
          pip install -r apps/api/requirements.txt

      - name: Run unit tests (apps/api)
        working-directory: propai-platform/apps/api
        run: python -m pytest tests/ -q --no-header

      # 루트 계약 스위트(propai-platform/tests) — 과거 CI 밖에서 17실패가 방치됐던
      # 갭을 게이트로 편입(931+ tests, 무DB). apps/api 스위트와 별개 커버리지.
      - name: Run root contract suite (propai-platform/tests)
        working-directory: propai-platform
        run: python -m pytest tests/ -q --no-header

  frontend-checks:
    name: Frontend (type-check + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      - name: Type check
        run: pnpm type-check
        working-directory: propai-platform/apps/web
        continue-on-error: true # 기존 에러 정리 전까지 비차단 — 정리 후 제거할 것

      - name: Lint
        run: pnpm lint
        working-directory: propai-platform/apps/web
        continue-on-error: true # 기존 에러 정리 전까지 비차단 — 정리 후 제거할 것

      - name: Unit tests
        run: pnpm test:run
        working-directory: propai-platform/apps/web
        timeout-minutes: 20 # OOM 재발 시 40분+ 낭비 방지(실패 로그상 ~45분 태우고 죽었음)
        env:
          # ★heap OOM 방지 — vitest(jsdom) V8 힙 상한 상향. ★실측 근거: 기존 실패 CI 로그 2건이
          #   모두 ~4128MB(Node22·이 러너의 '기본' max-old-space-size)에서 죽었으므로, 기본값보다
          #   낮은 4096 은 무의미 → 그보다 명확히 큰 6144 로 상향한다(러너 16GB·maxForks 2 → 총
          #   ~12GB, 여유 확보). vitest.config 의 maxForks 제한·logHeapUsage 와 병행.
          #   근본(원흉 테스트) 특정은 logHeapUsage 로그로 후속 진단.
          NODE_OPTIONS: --max-old-space-size=6144
