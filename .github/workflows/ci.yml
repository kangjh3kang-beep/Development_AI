name: CI

on:
  push:
    branches: [main]
    paths: ["propai-platform/**"]
  pull_request:
    paths: ["propai-platform/**"]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propai-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: propai-platform/apps/api/requirements.txt

      - name: Install GDAL native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # gdal 파이썬 바인딩은 시스템 libgdal 버전과 일치해야 소스빌드된다. requirements의 정확핀 대신
          # 시스템 버전으로 먼저 설치하면, 이후 requirements(gdal 범위)는 충족돼 재빌드하지 않는다.
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          pip install "gdal==$(gdal-config --version)"
          pip install -r apps/api/requirements.txt

      # 린트 게이트(2026-07-02 ruff 부채 2072→0 달성 후 승격): 빠른 실패 위해 테스트 전 실행.
      - name: Ruff lint (apps/api)
        working-directory: propai-platform/apps/api
        run: python -m ruff check .

      - name: Run unit tests (apps/api)
        working-directory: propai-platform/apps/api
        run: python -m pytest tests/ -q --no-header

  frontend-checks:
    name: Frontend (type-check + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: propai-platform

      # 게이트 승격(2026-07-02): tsc 0·eslint 에러 0 달성 — 비차단(continue-on-error) 제거.
      - name: Type check
        run: pnpm type-check
        working-directory: propai-platform/apps/web

      - name: Lint
        run: pnpm lint
        working-directory: propai-platform/apps/web

      - name: Unit tests
        run: pnpm test:run
        working-directory: propai-platform/apps/web
