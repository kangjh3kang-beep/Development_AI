name: Deliberation Engine CI

# 심의분석 엔진(services/deliberation-review) 전용 백엔드 테스트(515개).
# ★paths 필터로 엔진 소스가 바뀔 때만 실행 — 나머지 PR의 CI 시간에 영향 0.
#   (엔진의 중첩 .github/workflows/ci.yml은 저장소 루트가 아니라 GitHub가 실행하지 않으므로,
#    실제 활성 워크플로인 루트 .github/workflows 아래로 이식해 감사망을 봉합한다.)
on:
  push:
    branches: [main]
    paths: ["propai-platform/services/deliberation-review/**"]
  pull_request:
    paths: ["propai-platform/services/deliberation-review/**"]
  workflow_dispatch:

jobs:
  engine-tests:
    name: Deliberation Engine (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propai-platform/services/deliberation-review
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: propai_user
          POSTGRES_PASSWORD: propai_pass_dev
          POSTGRES_DB: propai_review
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propai_user" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.4
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://propai_user:propai_pass_dev@localhost:5432/propai_review
      REDIS_URL: redis://localhost:6379/0
      DB_SCHEMA: review
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine (+dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff (lint, non-blocking)
        run: ruff check . || true

      - name: Static scan (하드코딩 법정수치 스캐너 로딩 확인)
        run: python -c "from tools.static_scan import scan_for_numeric_legal_constants as s; print('scan ready')"

      - name: Alembic migrate up/down/up (review 스키마)
        working-directory: propai-platform/services/deliberation-review/apps/api
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Pytest (515 engine tests)
        run: pytest -q
