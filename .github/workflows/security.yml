# W1-1 이식: propai-platform/.github/workflows/security.yml(중첩 위치라 GitHub이 실행하지
# 않던 죽은 설정) 중 실행 가능한 3잡(bandit·pip-audit·gitleaks)을 리포 루트로 이식 +
# 모노레포 경로 교정. Trivy/OWASP-ZAP 잡은 존재하지 않는 apps/api/Dockerfile 경로를
# 전제해 실행 불능이라 미이식(필요 시 Dockerfile.oracle 기준으로 재설계).
#
# 트리거는 main push + 주간 스케줄 + 수동 — 보안 스캔은 정보성 신호로 운용하고
# PR 게이트로 세우지 않는다(취약점 발견이 무관한 PR을 막는 것을 방지).
name: Security Scan

on:
  push:
    branches: [main]
    paths: ["propai-platform/**"]
  schedule:
    - cron: "0 15 * * 0" # 매주 일요일 00:00 KST
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r propai-platform/apps/api/ -ll -ii \
            -x propai-platform/apps/api/tests,propai-platform/apps/api/.venv

  pip-audit:
    name: pip-audit (Dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan Python dependencies (manifest only)
        # 설치 없이 requirements 매니페스트만 스캔 — gdal 등 네이티브 빌드 의존성 회피.
        run: |
          pip install pip-audit
          pip-audit --strict --desc -r propai-platform/apps/api/requirements.txt

  gitleaks:
    name: Gitleaks (Secret Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # WP-I(P15 공급망 게이트): SBOM(syft)+서명(cosign). 기존 CI 게이트(ci.yml pytest·tsc·build)와
  # 완전 분리된 additive 잡이며, 이 워크플로우는 PR 게이트가 아니라 정보성 신호다(위 헤더 정책).
  # 도구 미설치 환경 graceful: 설치 스텝 포함·서명은 continue-on-error(키/OIDC 부재 시 비차단).
  supply-chain:
    name: Supply Chain (SBOM + cosign)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cosign keyless(OIDC) 서명용.
    steps:
      - uses: actions/checkout@v4

      # 1) SBOM 생성 — syft 로 requirements 의존성 목록을 SPDX·CycloneDX 로 산출.
      #    anchore/sbom-action 이 syft 를 설치·실행한다(별도 설치 스텝 불필요).
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: propai-platform/apps/api
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: propai-platform/apps/api
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      # 2) SBOM 아티팩트 업로드(공급망 증적 — 릴리스 첨부/감사용).
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          if-no-files-found: warn

      # 3) cosign 설치.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # 4) SBOM keyless 서명(blob 서명 — 이미지 빌드/푸시는 수동 배포 파이프라인에서 수행하므로
      #    여기선 SBOM 산출물을 서명해 무결성 증적을 남긴다). OIDC/Rekor 미가용 시 비차단.
      - name: Sign SBOM (cosign keyless)
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cosign version
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json

      - name: Upload cosign signature
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-signature
          path: |
            sbom.spdx.json.sig
            sbom.spdx.json.pem
          if-no-files-found: ignore
