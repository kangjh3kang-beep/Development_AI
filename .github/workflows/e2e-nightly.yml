# W1-1 이식: propai-platform/.github/workflows/e2e.yml(중첩 위치라 GitHub이 실행하지 않던
# 죽은 설정)을 리포 루트로 이식 + 모노레포 경로 교정(working-directory: propai-platform).
#
# 처음은 nightly+수동 트리거로 실행 궤도에 올린다(PR 게이트 아님) — 30분급 무거운 잡을
# 검증 이력 없이 PR 차단기로 세우면 main 속도를 해치고, 반대로 중첩 위치에 두면 영원히
# 안 도는 게이트 착시가 된다. 안정 이력이 쌓이면 pull_request 게이트로 승격할 것.
name: E2E Nightly

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 KST
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: propai-platform
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: propai_user
          POSTGRES_PASSWORD: propai_pass_dev
          POSTGRES_DB: propai_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: propai-platform/apps/api/requirements.txt

      - name: Install GDAL native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          pip install "gdal==$(gdal-config --version)"
          pip install -r apps/api/requirements.txt

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: propai-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @propai/web exec playwright install --with-deps chromium

      - name: Start API server
        working-directory: propai-platform/apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://propai_user:propai_pass_dev@localhost:5432/propai_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: e2e-test-secret-key-not-for-prod
          ENVIRONMENT: test
        run: |
          PYTHONPATH=. python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API server ready (${i}s)"; break
            fi
            if [ "$i" -eq 45 ]; then echo "API server start failed"; exit 1; fi
            sleep 2
          done

      - name: Build & start Web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          pnpm --filter @propai/web build
          pnpm --filter @propai/web start &
          sleep 8

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3000
          CI: true
        run: pnpm --filter @propai/web exec playwright test --reporter=github

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: propai-platform/apps/web/playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: propai-platform/apps/web/test-results/
          retention-days: 7
